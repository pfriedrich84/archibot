services:
  archibot:
    image: ghcr.io/pfriedrich84/archibot:${IMAGE_TAG:-latest}
    container_name: archibot
    restart: unless-stopped
    environment:
      # --- Paperless-NGX (used by first-run import and Python workers) ---
      PAPERLESS_URL: ${PAPERLESS_URL:-}
      PAPERLESS_INBOX_TAG_ID: ${PAPERLESS_INBOX_TAG_ID:-}
      KEEP_INBOX_TAG: ${KEEP_INBOX_TAG:-true}

      # --- Laravel/Svelte app (primary UI/API) ---
      GUI_PORT: ${GUI_PORT:-8088}
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-}
      APP_PATH_PREFIX: ${APP_PATH_PREFIX:-}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-archibot}
      DB_USERNAME: ${DB_USERNAME:-archibot}
      DB_PASSWORD: ${DB_PASSWORD:-archibot}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://archibot:archibot@postgres:5432/archibot}
      ABSURD_DATABASE_URL: ${ABSURD_DATABASE_URL:-${DATABASE_URL:-postgresql+psycopg://archibot:archibot@postgres:5432/archibot}}
      ARCHIBOT_QUEUE_PREFIX: ${ARCHIBOT_QUEUE_PREFIX:-archibot}
      # Required unless first-run setup stores the encrypted global webhook.secret setting.
      PAPERLESS_WEBHOOK_SECRET: ${PAPERLESS_WEBHOOK_SECRET:-}
      PAPERLESS_WEBHOOK_MAX_BYTES: ${PAPERLESS_WEBHOOK_MAX_BYTES:-262144}
      PAPERLESS_WEBHOOK_RATE_LIMIT_PER_MINUTE: ${PAPERLESS_WEBHOOK_RATE_LIMIT_PER_MINUTE:-60}
      PAPERLESS_WEBHOOK_DEVELOPMENT_BYPASS: ${PAPERLESS_WEBHOOK_DEVELOPMENT_BYPASS:-false}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      CACHE_STORE: ${CACHE_STORE:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      QUEUE_WORKER_TIMEOUT: ${QUEUE_WORKER_TIMEOUT:-21600}
      DB_QUEUE_RETRY_AFTER: ${DB_QUEUE_RETRY_AFTER:-21720}
      ARCHIBOT_PYTHON_BINARY: ${ARCHIBOT_PYTHON_BINARY:-python}
      ARCHIBOT_RECOVERY_INTERVAL_SECONDS: ${ARCHIBOT_RECOVERY_INTERVAL_SECONDS:-30}
      ARCHIBOT_STALE_CANCELLING_MINUTES: ${ARCHIBOT_STALE_CANCELLING_MINUTES:-30}
      ARCHIBOT_STALE_QUEUED_MINUTES: ${ARCHIBOT_STALE_QUEUED_MINUTES:-5}
      ARCHIBOT_STALE_RUNNING_MINUTES: ${ARCHIBOT_STALE_RUNNING_MINUTES:-10}

      # --- AI provider / Python workers ---
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_URL: ${OLLAMA_URL:-${OPENAI_BASE_URL:-http://ollama:11434}}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-${OLLAMA_URL:-http://ollama:11434}}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_PROVIDER_PROFILES: ${AI_PROVIDER_PROFILES:-}
      CLASSIFICATION_PROVIDER: ${CLASSIFICATION_PROVIDER:-}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-}
      JUDGE_PROVIDER: ${JUDGE_PROVIDER:-}
      CHAT_PROVIDER: ${CHAT_PROVIDER:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Preferred role-based names (legacy OLLAMA_* aliases remain supported by Python)
      CLASSIFICATION_MODEL: ${CLASSIFICATION_MODEL:-${OLLAMA_MODEL:-gemma4:e4b}}
      ARCHIBOT_EMBEDDING_MODEL: ${ARCHIBOT_EMBEDDING_MODEL:-${EMBEDDING_MODEL:-${OLLAMA_EMBED_MODEL:-qwen3-embedding:4b}}}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-${ARCHIBOT_EMBEDDING_MODEL:-${OLLAMA_EMBED_MODEL:-qwen3-embedding:4b}}}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-${OLLAMA_EMBED_DIM:-0}}
      # Legacy aliases for older images / scripts
      OLLAMA_MODEL: ${OLLAMA_MODEL:-${CLASSIFICATION_MODEL:-gemma4:e4b}}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-${ARCHIBOT_EMBEDDING_MODEL:-${EMBEDDING_MODEL:-qwen3-embedding:4b}}}
      OLLAMA_EMBED_DIM: ${OLLAMA_EMBED_DIM:-${EMBEDDING_DIMENSION:-0}}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-600}
      OCR_TEXT_MODEL: ${OCR_TEXT_MODEL:-${OCR_MODEL:-${OLLAMA_OCR_MODEL:-qwen3:4b}}}
      OCR_MODEL: ${OCR_MODEL:-${OCR_TEXT_MODEL:-${OLLAMA_OCR_MODEL:-qwen3:4b}}}
      JUDGE_MODEL: ${JUDGE_MODEL:-${OLLAMA_JUDGE_MODEL:-qwen3:4b}}
      OLLAMA_OCR_MODEL: ${OLLAMA_OCR_MODEL:-${OCR_TEXT_MODEL:-${OCR_MODEL:-qwen3:4b}}}
      OLLAMA_JUDGE_MODEL: ${OLLAMA_JUDGE_MODEL:-${JUDGE_MODEL:-qwen3:4b}}
      OLLAMA_EMBED_RETRIES: ${OLLAMA_EMBED_RETRIES:-3}
      OLLAMA_EMBED_RETRY_BASE_DELAY: ${OLLAMA_EMBED_RETRY_BASE_DELAY:-1.0}
      OLLAMA_CHAT_RETRIES: ${OLLAMA_CHAT_RETRIES:-2}
      OLLAMA_CHAT_RETRY_BASE_DELAY: ${OLLAMA_CHAT_RETRY_BASE_DELAY:-1.0}
      OLLAMA_MODEL_SWAP_DELAY: ${OLLAMA_MODEL_SWAP_DELAY:-${OLLAMA_MODEL_SWAP_DELAY_SECONDS:-8}}
      CLASSIFICATION_CONTEXT_WINDOW: ${CLASSIFICATION_CONTEXT_WINDOW:-${OLLAMA_NUM_CTX:-16384}}
      EMBEDDING_CONTEXT_WINDOW: ${EMBEDDING_CONTEXT_WINDOW:-${OLLAMA_EMBED_NUM_CTX:-8192}}
      OCR_CONTEXT_WINDOW: ${OCR_CONTEXT_WINDOW:-${OLLAMA_OCR_NUM_CTX:-12288}}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-${CLASSIFICATION_CONTEXT_WINDOW:-16384}}
      OLLAMA_EMBED_NUM_CTX: ${OLLAMA_EMBED_NUM_CTX:-${EMBEDDING_CONTEXT_WINDOW:-8192}}
      OLLAMA_OCR_NUM_CTX: ${OLLAMA_OCR_NUM_CTX:-${OCR_CONTEXT_WINDOW:-12288}}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-600}
      CONTEXT_MAX_DOCS: ${CONTEXT_MAX_DOCS:-5}
      MAX_DOC_CHARS: ${MAX_DOC_CHARS:-24000}
      EMBED_MAX_CHARS: ${EMBED_MAX_CHARS:-${EMBEDDING_MAX_CHARS:-6000}}
      EMBEDDING_MAX_CHARS: ${EMBEDDING_MAX_CHARS:-${EMBED_MAX_CHARS:-6000}}
      EMBEDDING_DOCUMENT_TIMEOUT_SECONDS: ${EMBEDDING_DOCUMENT_TIMEOUT_SECONDS:-180}
      ENABLE_JUDGE_VERIFICATION: ${ENABLE_JUDGE_VERIFICATION:-false}
      JUDGE_CONFIDENCE_THRESHOLD: ${JUDGE_CONFIDENCE_THRESHOLD:-101}
      OCR_MODE: ${OCR_MODE:-off}
      OCR_VISION_MODEL: ${OCR_VISION_MODEL:-}
      OCR_VISION_MAX_PAGES: ${OCR_VISION_MAX_PAGES:-3}
      OCR_VISION_DPI: ${OCR_VISION_DPI:-150}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}


      # --- MCP ---
      ENABLE_MCP: ${ENABLE_MCP:-false}
      MCP_TRANSPORT: ${MCP_TRANSPORT:-sse}
      MCP_PORT: ${MCP_PORT:-3001}
      MCP_HOST: ${MCP_HOST:-0.0.0.0}
      MCP_ENABLE_WRITE: ${MCP_ENABLE_WRITE:-false}
      MCP_API_KEY: ${MCP_API_KEY:-}
      MCP_LARAVEL_AUTH_ENABLED: ${MCP_LARAVEL_AUTH_ENABLED:-true}
      MCP_LARAVEL_PATH: ${MCP_LARAVEL_PATH:-/app/laravel}
      MCP_LARAVEL_PHP_BINARY: ${MCP_LARAVEL_PHP_BINARY:-php}
      MCP_CLASSIFY_RATE_LIMIT: ${MCP_CLASSIFY_RATE_LIMIT:-10}

      # --- Storage / Logging ---
      DATA_DIR: ${DATA_DIR:-/data}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "${GUI_PORT:-8088}:${GUI_PORT:-8088}"
      - "${MCP_PORT:-3001}:3001"
    volumes:
      - archibot_data:/data
    depends_on:
      postgres:
        condition: service_healthy
    # Falls Paperless/Ollama in anderen Compose-Stacks laufen,
    # entsprechendes externes Netzwerk einkommentieren:
    # networks:
    #   - paperless
    #   - ollama

  postgres:
    image: pgvector/pgvector:pg16
    container_name: archibot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-archibot}
      POSTGRES_USER: ${POSTGRES_USER:-archibot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-archibot}
    volumes:
      - archibot_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  archibot_data:
    driver: local
  archibot_postgres:
    driver: local

