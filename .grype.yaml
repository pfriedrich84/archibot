# Grype vulnerability scanner configuration
#
# Ignore CPython-vendored library CVEs that require a Python major version
# upgrade (3.14+) to fix. These are in statically-compiled C libraries
# bundled inside the Python interpreter binary — apt-get upgrade cannot
# fix them, and rebuilding CPython is out of scope.
#
# See: https://github.com/anchore/grype/issues/2852
ignore:
  # libexpat CVEs bundled in CPython — fix requires Python 3.14+
  - vulnerability: "CVE-2024-8176"
  - vulnerability: "CVE-2024-45490"
  - vulnerability: "CVE-2024-45491"
  - vulnerability: "CVE-2024-45492"
  - vulnerability: "CVE-2025-59375"
  # libexpat 2.7.5 CVEs (infinite loop in DTD parsing)
  - vulnerability: "CVE-2026-32776"
  - vulnerability: "CVE-2026-32777"
  - vulnerability: "CVE-2026-32778"
