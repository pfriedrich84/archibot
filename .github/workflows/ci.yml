name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  PAPERLESS_URL: "http://localhost:8000"
  PAPERLESS_TOKEN: "test-token"
  PAPERLESS_INBOX_TAG_ID: "1"
  DATA_DIR: "/tmp/test-data"

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install -c constraints.txt -e ".[dev]"

      - name: Environment diagnostics
        run: |
          python --version
          python -m pip --version
          python -m pip freeze | sort
          python -m pip check
          which archibot || true
          python - <<'PY'
          import importlib.metadata as m
          for pkg in ["archibot", "mcp", "pytest", "ruff"]:
              try:
                  print(f"{pkg}=={m.version(pkg)}")
              except Exception as exc:
                  print(f"{pkg}: missing ({exc})")
          PY

      - name: Ruff lint
        run: python -m ruff check app/ tests/

      - name: Ruff format check
        run: python -m ruff format --check app/ tests/

      - name: Hadolint Dockerfile lint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Dependency compatibility check
        run: python -m pip check

      - name: Install pip-audit
        run: |
          python -m pip install --progress-bar off -c constraints.txt pip-audit
          python -m pip show pip-audit

      - name: Run security audit
        run: |
          ARGS=""
          while IFS= read -r line; do
            line="${line%%#*}"
            line="$(echo "$line" | xargs)"
            [ -n "$line" ] && ARGS="$ARGS --ignore-vuln $line"
          done < .pip-audit-known-vulnerabilities
          echo "Running: python -m pip_audit --skip-editable $ARGS"
          eval python -m pip_audit --skip-editable $ARGS

      - name: Dependency age check (supply-chain protection)
        run: python scripts/check_dependency_age.py --min-days 3

      - name: Console script check
        run: |
          archibot --help
          python -m app.cli --help

      - name: Worker runtime import check
        run: python -c "import app.cli; import app.mcp_server"

      - name: DB schema check
        run: python -c "from app.db import init_db; init_db()"

      - name: Agent docs link check
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          files = [
              Path("AGENTS.md"),
              Path("CLAUDE.md"),
              *Path("docs/agent").glob("*.md"),
          ]
          missing = []
          for file in files:
              if not file.exists():
                  continue
              text = file.read_text(encoding="utf-8")
              for match in re.finditer(r"\[[^\]]+\]\(([^)]+)\)", text):
                  target = match.group(1)
                  if "://" in target or target.startswith("#") or target.startswith("mailto:"):
                      continue
                  target_path = target.split("#", 1)[0]
                  if not target_path:
                      continue
                  path = (file.parent / target_path).resolve()
                  if not path.exists():
                      missing.append((str(file), target))

          if missing:
              print("Missing agent doc links:")
              for file, target in missing:
                  print(f"  {file}: {target}")
              sys.exit(1)
          print("All agent doc links OK")
          PY

      - name: Prompt file check
        run: python -c "from app.pipeline.classifier import _load_system_prompt; assert len(_load_system_prompt()) > 100"

      - name: Failure diagnostics
        if: failure()
        run: |
          echo "=== pip check ==="
          python -m pip check || true
          echo "=== pip freeze ==="
          python -m pip freeze | sort || true
          echo "=== archibot path ==="
          which archibot || true
          echo "=== import metadata ==="
          python - <<'PY'
          import importlib.metadata as m
          for pkg in ["archibot", "mcp", "pytest", "ruff"]:
              try:
                  print(f"{pkg}=={m.version(pkg)}")
              except Exception as exc:
                  print(f"{pkg}: missing ({exc})")
          PY

  laravel-starter:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: archibot_test
          POSTGRES_USER: archibot
          POSTGRES_PASSWORD: archibot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archibot -d archibot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: laravel
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pgsql, pdo_pgsql, mbstring, dom, curl, zip
          coverage: none

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: laravel/package-lock.json

      - name: Install Laravel dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare Laravel environment
        run: |
          cp .env.example .env
          php artisan key:generate --ansi
          php artisan migrate --force --ansi

      - name: Install Laravel frontend dependencies
        run: npm ci

      - name: Laravel backend tests
        run: composer test

      - name: Laravel frontend lint
        run: npm run lint:check

      - name: Laravel frontend format check
        run: npm run format:check

      - name: Laravel frontend type check
        run: npm run types:check

      - name: Laravel frontend build
        run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t test .

      - name: Grype container scan
        uses: anchore/scan-action@v7
        id: grype
        with:
          image: test
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: table

      - name: Grype SARIF report
        uses: anchore/scan-action@v7
        if: always()
        id: grype-sarif
        with:
          image: test
          fail-build: false
          severity-cutoff: high
          only-fixed: true
          output-format: sarif

      - name: Upload Grype SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ steps.grype-sarif.outputs.sarif }}

      - name: Trivy container scan
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format table \
            --exit-code 1 \
            test

      - name: Trivy SARIF report
        if: always()
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v "$PWD:/work" \
            aquasec/trivy:latest image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output /work/trivy-results.sarif \
            test

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Verify CLI in Docker image
        run: docker run --rm test archibot --help
