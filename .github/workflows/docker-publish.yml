name: Build & Publish Docker Image

on:
  push:
    branches: [feat/laravel]
    paths:
      - .github/workflows/docker-publish.yml
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main, feat/laravel]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    if: >-
      github.event_name == 'push' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'pull_request')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tested short SHA
        id: vars
        run: |
          if [ "${EVENT_NAME}" = "workflow_run" ]; then
            sha="${WORKFLOW_RUN_SHA}"
          else
            sha="${PUSH_SHA}"
          fi
          echo "short_sha=${sha::7}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable=${{ github.event.workflow_run.head_branch == 'main' }}
            type=raw,value=feat-laravel,enable=${{ github.ref_name == 'feat/laravel' || github.event.workflow_run.head_branch == 'feat/laravel' }}
            type=raw,value=sha-${{ steps.vars.outputs.short_sha }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            ARCHIBOT_GIT_SHA=${{ steps.vars.outputs.sha }}
            ARCHIBOT_GIT_REF=${{ github.event.workflow_run.head_branch || github.ref_name }}
